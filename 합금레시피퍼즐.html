<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>합금 레시피 연구소</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --paper:#F5F0E6; --ink:#2B2420; --wood-deep:#B5651D; --gold:#E8A33D;
    --red:#D6534A; --green:#3E8E5C; --line:#DED4C2;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;min-height:100%;
    background:
      radial-gradient(circle at 15% 8%, rgba(181,101,29,0.06), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(76,120,147,0.07), transparent 45%),
      var(--paper);
    font-family:'Pretendard', -apple-system, sans-serif; color:var(--ink);
    -webkit-user-select:none; user-select:none;
  }
  .wrap{ max-width:460px; margin:0 auto; padding:16px 14px 30px; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .title .eyebrow{ font-size:10.5px; letter-spacing:0.14em; color:var(--wood-deep); font-weight:700; margin-bottom:2px; }
  .title h1{ font-size:20px; margin:0; font-weight:800; letter-spacing:-0.02em; }
  .stats{ display:flex; gap:8px; }
  .stat{ background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:5px 10px; text-align:center; min-width:52px; }
  .stat .num{ font-size:16px; font-weight:800; }
  .stat .lbl{ font-size:9px; color:#8a7f6f; font-weight:600; }

  .progress{ display:flex; gap:5px; margin-bottom:14px; }
  .progress .dot{ flex:1; height:6px; border-radius:4px; background:#e5dccb; border:1px solid var(--line); }
  .progress .dot.done{ background:var(--gold); }
  .progress .dot.current{ background:var(--wood-deep); }

  .mission-card{
    background:#fffdf8; border:2px solid var(--ink); border-radius:16px; padding:14px 16px;
    box-shadow:3px 3px 0 var(--ink); margin-bottom:14px;
  }
  .mission-card .lbl{ font-size:11px; font-weight:800; color:var(--wood-deep); letter-spacing:0.05em; margin-bottom:4px; }
  .mission-card .txt{ font-size:14.5px; font-weight:700; line-height:1.5; }

  .cauldron-zone{
    background:#efe6d3; border:2.5px dashed var(--ink); border-radius:16px;
    min-height:88px; padding:10px; display:flex; flex-wrap:wrap; gap:8px; align-items:center;
    margin-bottom:14px; transition:transform 0.1s;
  }
  .cauldron-zone.shake{ animation:shakeC 0.35s; }
  @keyframes shakeC{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
  .cauldron-zone .placeholder{ font-size:12px; color:#a0967f; font-weight:600; }

  .chip{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:76px; min-height:70px; border-radius:12px; border:2px solid var(--ink);
    background:#fff; cursor:pointer; padding:6px 4px; text-align:center;
    box-shadow:2px 2px 0 var(--ink); transition:transform 0.08s;
  }
  .chip:active{ transform:translateY(1px); }
  .chip .icon{ font-size:22px; }
  .chip .name{ font-size:11px; font-weight:800; margin-top:2px; }
  .chip .tag{ font-size:8.5px; color:#7d7362; margin-top:2px; line-height:1.25; }
  .chip.selected{ background:var(--gold); border-color:var(--wood-deep); }
  .chip.disabled{ opacity:0.35; cursor:default; }

  .shelf-lbl{ font-size:11px; font-weight:800; color:#6b6154; margin-bottom:8px; }
  .shelf{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; justify-content:center; }

  .actions{ display:flex; gap:8px; justify-content:center; }
  .btn{ background:var(--ink); color:var(--paper); border:none; border-radius:12px; padding:11px 18px; font-size:14px; font-weight:700; cursor:pointer; box-shadow:3px 3px 0 var(--wood-deep); }
  .btn:active{ transform:translateY(2px); box-shadow:1px 1px 0 var(--wood-deep); }
  .btn.ghost{ background:#fff; color:var(--ink); box-shadow:3px 3px 0 var(--ink); }
  .btn:disabled{ opacity:0.4; cursor:default; }

  .feedback{ text-align:center; font-size:12.5px; font-weight:700; margin-top:10px; min-height:18px; }
  .feedback.wrong{ color:var(--red); }
  .feedback.info{ color:#6b6154; }

  .overlay{ position:fixed; inset:0; background:rgba(43,36,32,0.72); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; }
  .overlay.hidden{ display:none; }
  .panel{ background:var(--paper); border:2.5px solid var(--ink); border-radius:20px; padding:26px 24px; max-width:380px; width:100%; text-align:center; box-shadow:6px 6px 0 var(--ink); }
  .panel h2{ margin:0 0 8px; font-size:22px; font-weight:800; }
  .panel .resulticon{ font-size:46px; margin:6px 0; }
  .panel p{ margin:0 0 16px; color:#6b6154; font-size:13px; line-height:1.65; }
  .panel .big{ font-size:40px; font-weight:900; margin:6px 0; color:var(--wood-deep); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">
      <div class="eyebrow">재료의 특성과 가공 · 미니게임</div>
      <h1>합금 레시피 연구소</h1>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="scoreNum">0</div><div class="lbl">점수</div></div>
      <div class="stat"><div class="num" id="levelNum">1/6</div><div class="lbl">단계</div></div>
    </div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="mission-card">
    <div class="lbl">🧪 의뢰 내용</div>
    <div class="txt" id="missionTxt">-</div>
  </div>

  <div class="shelf-lbl">재료 선반 (탭해서 도가니에 담기)</div>
  <div class="shelf" id="shelf"></div>

  <div class="shelf-lbl">🔥 도가니 (탭하면 다시 뺄 수 있어요)</div>
  <div class="cauldron-zone" id="cauldron"><span class="placeholder">여기에 재료를 담아 보세요</span></div>

  <div class="actions">
    <button class="btn ghost" id="hintBtn">💡 힌트 (-15점)</button>
    <button class="btn" id="submitBtn">제출하기</button>
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<div class="overlay" id="startOverlay">
  <div class="panel">
    <h2>합금 레시피 연구소 ⚗️</h2>
    <p>의뢰받은 특성에 맞는 합금을 만들어야 해요.<br>재료 선반에서 알맞은 재료를 골라 도가니에 담고<br><b>제출하기</b>를 눌러 보세요. 재료의 특징을 잘 읽고<br>필요한 것만 정확히 골라야 해요!</p>
    <button class="btn" id="startBtn">시작하기</button>
  </div>
</div>

<div class="overlay hidden" id="successOverlay">
  <div class="panel">
    <h2 id="successTitle">성공!</h2>
    <div class="resulticon" id="successIcon">🎉</div>
    <p id="successFact"></p>
    <button class="btn" id="nextBtn">다음 의뢰</button>
  </div>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="panel">
    <h2>연구소 임무 완료!</h2>
    <div class="big" id="finalScore">0</div>
    <p id="finalMsg">수고했어요!</p>
    <button class="btn" id="restartBtn">처음부터 다시</button>
  </div>
</div>

<script>
const INGREDIENTS = {
  '탄소강': {icon:'🔩', tag:'가공성·강도가 우수한 철'},
  '크로뮴': {icon:'🔷', tag:'녹슬지 않게 해줌'},
  '니켈':   {icon:'⚪', tag:'내식성과 강도를 높여줌'},
  '텅스텐': {icon:'🌟', tag:'고온에서도 단단함 유지'},
  '구리':   {icon:'🟠', tag:'전기·열이 잘 통함'},
  '주석':   {icon:'🥄', tag:'단단함·내마모성을 더해줌'},
  '아연':   {icon:'🔘', tag:'가공성과 색감을 좋게 함'},
  '알루미늄':{icon:'🥫', tag:'가볍고 잘 안 녹슴'},
  '마그네슘':{icon:'✨', tag:'더 가볍고 강하게 해줌'},
  '탄소 섬유':{icon:'🕸️', tag:'가볍고 매우 단단함'},
  '에폭시 수지':{icon:'💧', tag:'접착력 좋고 빨리 굳음'},
  '흙':     {icon:'🟤', tag:'합금 성분이 아니에요'},
  '유리':   {icon:'🥛', tag:'투명하지만 잘 깨짐'},
  '고무':   {icon:'⚫', tag:'탄성이 있는 재료'},
  '목재':   {icon:'🪵', tag:'가볍고 무늬가 아름다움'},
  '순철':   {icon:'⛓️', tag:'탄소가 거의 없는 철'},
};

const RECIPES = [
  {
    name:'스테인리스강', icon:'🍳',
    mission:'녹이 잘 슬지 않아서 식품 용기나 조리 기구에 쓰이는 금속을 만들어 주세요.',
    need:['탄소강','크로뮴','니켈'],
    fact:'탄소강에 크로뮴과 니켈을 더하면 내식성이 크게 좋아진 스테인리스강이 돼요!'
  },
  {
    name:'고속도강', icon:'🛠️',
    mission:'고온에서도 단단함을 유지해서 금속을 깎는 절삭 공구에 쓰이는 금속을 만들어 주세요.',
    need:['탄소강','텅스텐','크로뮴'],
    fact:'탄소강에 텅스텐과 크로뮴을 더하면 고온에서도 경도가 유지되는 고속도강이 돼요!'
  },
  {
    name:'청동', icon:'🔔',
    mission:'단단하고 마모에 강해서 동상이나 동전을 만들 때 쓰이는 금속을 만들어 주세요.',
    need:['구리','주석'],
    fact:'구리에 주석을 더하면 경도가 높고 마모에 강한 청동이 돼요!'
  },
  {
    name:'황동', icon:'🎺',
    mission:'색이 아름답고 가공하기 좋아서 악기나 파이프에 쓰이는 금속을 만들어 주세요.',
    need:['구리','아연'],
    fact:'구리에 아연을 더하면 색이 아름답고 가공성이 좋은 황동이 돼요!'
  },
  {
    name:'두랄루민', icon:'✈️',
    mission:'가볍지만 강도가 뛰어나서 비행기나 등산 장비에 쓰이는 금속을 만들어 주세요.',
    need:['알루미늄','구리','마그네슘'],
    fact:'알루미늄에 구리와 마그네슘을 더하면 가볍고 강한 두랄루민이 돼요!'
  },
  {
    name:'탄소 섬유 강화 플라스틱', icon:'🏎️',
    mission:'금속처럼 단단하면서도 가벼워서 비행기·자동차 부품에 쓰이는 재료를 만들어 주세요.',
    need:['탄소 섬유','에폭시 수지'],
    fact:'탄소 섬유에 에폭시 수지를 더하면 가벼우면서 단단한 강화 플라스틱이 돼요!'
  },
];

const ALL_NAMES = Object.keys(INGREDIENTS);

let levelIdx = 0;
let score = 0;
let selected = new Set();
let wrongAttempts = 0;
let hintsUsed = 0;
let currentPool = [];

const shelfEl = document.getElementById('shelf');
const cauldronEl = document.getElementById('cauldron');
const missionTxt = document.getElementById('missionTxt');
const scoreNum = document.getElementById('scoreNum');
const levelNum = document.getElementById('levelNum');
const progressEl = document.getElementById('progress');
const feedbackEl = document.getElementById('feedback');
const startOverlay = document.getElementById('startOverlay');
const successOverlay = document.getElementById('successOverlay');
const endOverlay = document.getElementById('endOverlay');

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildPool(recipe){
  const need = recipe.need;
  const distractorPool = ALL_NAMES.filter(n=>!need.includes(n));
  const distractors = shuffle(distractorPool).slice(0, 5);
  return shuffle(need.concat(distractors));
}

function renderProgress(){
  progressEl.innerHTML = '';
  RECIPES.forEach((r,i)=>{
    const d = document.createElement('div');
    d.className = 'dot' + (i<levelIdx ? ' done' : (i===levelIdx ? ' current' : ''));
    progressEl.appendChild(d);
  });
}

function renderShelf(){
  shelfEl.innerHTML = '';
  currentPool.forEach(name=>{
    const info = INGREDIENTS[name];
    const chip = document.createElement('div');
    chip.className = 'chip' + (selected.has(name) ? ' selected' : '');
    chip.innerHTML = '<div class="icon">'+info.icon+'</div><div class="name">'+name+'</div><div class="tag">'+info.tag+'</div>';
    chip.addEventListener('click', ()=>{
      if(selected.has(name)) selected.delete(name);
      else selected.add(name);
      renderShelf();
      renderCauldron();
    });
    shelfEl.appendChild(chip);
  });
}

function renderCauldron(){
  cauldronEl.innerHTML = '';
  if(selected.size===0){
    cauldronEl.innerHTML = '<span class="placeholder">여기에 재료를 담아 보세요</span>';
    return;
  }
  selected.forEach(name=>{
    const info = INGREDIENTS[name];
    const chip = document.createElement('div');
    chip.className = 'chip selected';
    chip.innerHTML = '<div class="icon">'+info.icon+'</div><div class="name">'+name+'</div>';
    chip.addEventListener('click', ()=>{
      selected.delete(name);
      renderShelf();
      renderCauldron();
    });
    cauldronEl.appendChild(chip);
  });
}

function loadLevel(){
  const recipe = RECIPES[levelIdx];
  selected = new Set();
  wrongAttempts = 0;
  hintsUsed = 0;
  currentPool = buildPool(recipe);
  missionTxt.textContent = recipe.mission;
  levelNum.textContent = (levelIdx+1)+'/'+RECIPES.length;
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  renderProgress();
  renderShelf();
  renderCauldron();
}

function setsEqual(a,b){
  if(a.size !== b.size) return false;
  for(const x of a) if(!b.has(x)) return false;
  return true;
}

function submit(){
  const recipe = RECIPES[levelIdx];
  const needSet = new Set(recipe.need);
  if(selected.size===0){
    feedbackEl.textContent = '재료를 먼저 담아 보세요.';
    feedbackEl.className = 'feedback info';
    return;
  }
  if(setsEqual(selected, needSet)){
    let gained = 100 - wrongAttempts*20 - hintsUsed*15;
    gained = Math.max(gained, 20);
    score += gained;
    scoreNum.textContent = score;
    document.getElementById('successTitle').textContent = recipe.name + ' 완성!';
    document.getElementById('successIcon').textContent = recipe.icon;
    document.getElementById('successFact').textContent = recipe.fact + ' (+'+gained+'점)';
    successOverlay.classList.remove('hidden');
  } else {
    wrongAttempts++;
    feedbackEl.textContent = '음... 뭔가 맞지 않아요. 재료 설명을 다시 살펴보세요.';
    feedbackEl.className = 'feedback wrong';
    cauldronEl.classList.remove('shake'); void cauldronEl.offsetWidth; cauldronEl.classList.add('shake');
  }
}

function useHint(){
  const recipe = RECIPES[levelIdx];
  const missing = recipe.need.filter(n=>!selected.has(n));
  if(missing.length===0){
    feedbackEl.textContent = '이미 필요한 재료를 다 골랐어요! 제출해 보세요.';
    feedbackEl.className = 'feedback info';
    return;
  }
  hintsUsed++;
  selected.add(missing[0]);
  feedbackEl.textContent = '힌트: "'+missing[0]+'"이(가) 필요해요.';
  feedbackEl.className = 'feedback info';
  renderShelf();
  renderCauldron();
}

function nextLevel(){
  successOverlay.classList.add('hidden');
  levelIdx++;
  if(levelIdx >= RECIPES.length){
    document.getElementById('finalScore').textContent = score;
    let msg = '수고했어요! 합금의 세계를 잘 탐험했어요.';
    if(score>=520) msg = '완벽해요! 합금 마스터 연구원이네요 🏆';
    else if(score>=350) msg = '훌륭해요! 재료 조합을 잘 이해하고 있어요.';
    document.getElementById('finalMsg').textContent = msg;
    endOverlay.classList.remove('hidden');
    return;
  }
  loadLevel();
}

function startGame(){
  levelIdx = 0; score = 0;
  scoreNum.textContent = '0';
  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');
  loadLevel();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('submitBtn').addEventListener('click', submit);
document.getElementById('hintBtn').addEventListener('click', useHint);
document.getElementById('nextBtn').addEventListener('click', nextLevel);
document.getElementById('restartBtn').addEventListener('click', startGame);

loadLevel();
</script>
</body>
</html>
