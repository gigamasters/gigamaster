<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수송 기술 마스터! 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0c1e;
            --surface: #1a1535;
            --accent: #00f5d4;
            --text: #eee8ff;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
        }

        .timer { font-size: 1.5rem; color: #f72585; font-weight: 900; margin-bottom: 10px; }
        .score { font-size: 1.2rem; margin-bottom: 20px; }
        
        #transport-emoji {
            font-size: 80px;
            margin: 20px 0;
            display: block;
        }

        #transport-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            background: #43aa8b;
            color: white;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        button:active { transform: scale(0.95); }

        /* 결과 화면 */
        #result-screen { display: none; }
        .restart-btn { background: #9b5de5; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="play-screen">
            <div class="timer">시간: <span id="time">30</span>초</div>
            <div class="score">점수: <span id="score">0</span></div>
            
            <div id="transport-emoji">🚗</div>
            <div id="transport-name">전기 자동차</div>
            
            <p style="margin-bottom: 15px; color: var(--accent);">이 수송 수단의 동력원은?</p>
            <div class="button-group">
                <button onclick="checkAnswer('친환경')">🍃 친환경/신재생</button>
                <button onclick="checkAnswer('화석연료')">⛽ 화석연료/엔진</button>
            </div>
        </div>

        <div id="result-screen">
            <h1 style="color: #f9c74f;">게임 종료!</h1>
            <p style="font-size: 1.5rem;">당신의 점수는 <span id="final-score">0</span>점입니다.</p>
            <button class="restart-btn" onclick="location.reload()">다시 하기</button>
            <button class="restart-btn" style="background:#555" onclick="location.href='index.html'">메인으로</button>
        </div>
    </div>

    <script>
        const data = [
            { name: "전기 자동차", emoji: "🚗", type: "친환경" },
            { name: "가솔린 트럭", emoji: "🚛", type: "화석연료" },
            { name: "수소 버스", emoji: "🚌", type: "친환경" },
            { name: "디젤 기차", emoji: "🚂", type: "화석연료" },
            { name: "태양광 비행기", emoji: "✈️", type: "친환경" },
            { name: "석탄 증기선", emoji: "🚢", type: "화석연료" },
            { name: "전기 킥보드", emoji: "🛴", type: "친환경" },
            { name: "수소 자동차", emoji: "🚘", type: "친환경" }
        ];

        let currentItem = {};
        let score = 0;
        let timeLeft = 30;
        let gameActive = true;

        function nextQuestion() {
            currentItem = data[Math.floor(Math.random() * data.length)];
            document.getElementById('transport-emoji').innerText = currentItem.emoji;
            document.getElementById('transport-name').innerText = currentItem.name;
        }

        function checkAnswer(answer) {
            if(!gameActive) return;
            if(answer === currentItem.type) {
                score += 10;
                document.getElementById('score').innerText = score;
            }
            nextQuestion();
        }

        const timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }, 1000);

        function endGame() {
            gameActive = false;
            document.getElementById('play-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        nextQuestion();
    </script>
</body>
</html>
